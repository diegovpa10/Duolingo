{% extends 'aprendizaje/base.html' %}
{% block title %}Registro - RedOwl{% endblock %}

{% block content %}
    <div class="card" style="max-width: 400px; margin: 0 auto;">
        <h2 style="color: var(--accent-color); text-align: center;">Crea tu cuenta 🦉</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }} <button type="submit" class="btn" style="width: 100%;">Registrarse</button>
        </form>
        <br>
        <p style="text-align: center;">¿Ya tienes cuenta? <a href="{% url 'login' %}" style="color: var(--accent-color); background: none; padding: 0;">Inicia sesión aquí</a></p>
    </div>
{% endblock %}
