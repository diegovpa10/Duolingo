{% extends 'aprendizaje/base.html' %}

{% block title %}Acceso - RedOwl Academy{% endblock %}

{% block content %}
    <div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
        <div class="card" style="max-width: 400px; width: 100%; border-color: var(--secondary-accent); padding: 2.5rem;">
            
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2 style="color: var(--accent-color); font-weight: 800; letter-spacing: -1px; text-transform: uppercase; margin-bottom: 0.5rem;">
                    Identificación
                </h2>
                <p style="color: #666; font-size: 0.8rem; letter-spacing: 1px;">INGRESE SUS CREDENCIALES DE ACCESO</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                
                <style>
                    /* Estilo específico para los inputs generados por Django form.as_p */
                    form p { margin-bottom: 1.5rem; }
                    form label { 
                        display: block; 
                        font-size: 0.7rem; 
                        text-transform: uppercase; 
                        color: #555; 
                        margin-bottom: 5px; 
                        font-weight: bold;
                        letter-spacing: 1px;
                    }
                    form input { 
                        width: 100%; 
                        background-color: #000; 
                        border: 1px solid var(--secondary-accent); 
                        color: var(--text-color); 
                        padding: 10px; 
                        border-radius: 2px;
                        outline: none;
                        box-sizing: border-box;
                    }
                    form input:focus { border-color: var(--accent-color); }
                </style>

                {{ form.as_p }}

                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem; letter-spacing: 2px; font-weight: bold;">
                    AUTENTICAR
                </button>
            </form>

            <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #222; text-align: center;">
                <p style="font-size: 0.8rem; color: #444;">
                    ¿NUEVO USUARIO? 
                    <a href="{% url 'registro' %}" style="color: var(--text-color); text-decoration: none; font-weight: bold; margin-left: 5px; border-bottom: 1px solid var(--accent-color);">
                        CREAR CUENTA
                    </a>
                </p>
            </div>
        </div>
    </div>
{% endblock %}
