<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}RedOwl Academy{% endblock %}</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

<style>
:root {
    /* PALETA REDOWL ACADEMY */
    --bg-color: #0a0a0a;          /* Negro profundo */
    --card-bg: #121212;           /* Gris casi negro para tarjetas */
    --text-color: #e0e0e0;        /* Gris claro para lectura */
    --accent-color: #ff3333;      /* ROJO REDOWL */
    --secondary-accent: #222222;  /* Gris oscuro para bordes */
    --btn-hover: #cc0000;         /* Rojo oscuro */
}

[data-theme="light"] {
    --bg-color: #ffffff;
    --card-bg: #f5f5f5;
    --text-color: #1a1a1a;
    --accent-color: #d32f2f;
    --secondary-accent: #e0e0e0;
    --btn-hover: #b71c1c;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background-color: var(--bg-color);
    color: var(--text-color);
    transition: all 0.3s ease;
    line-height: 1.6;
}

/* NAVBAR CON LÍNEA ROJA */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem 5%; /* Ajustado para dar más espacio a los lados */
    background-color: var(--bg-color);
    border-bottom: 1px solid var(--secondary-accent);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.logo {
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: -1px;
    color: var(--text-color);
    text-decoration: none;
}

.logo span {
    color: var(--accent-color);
}

/* TARJETAS CON HOVER ROJO */
.card {
    background-color: var(--card-bg);
    border: 1px solid var(--secondary-accent);
    border-radius: 4px;
    padding: 2rem;
    margin-bottom: 20px;
    transition: transform 0.2s ease, border-color 0.3s ease;
}

.card:hover { border-color: var(--accent-color); }

/* BOTONES ROJOS */
.btn {
    display: inline-block;
    background-color: var(--accent-color);
    color: white;
    padding: 12px 24px;
    border-radius: 12px; /* Redondeado para verse más moderno */
    text-decoration: none;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: background 0.3s ease, box-shadow 0.3s ease;
    text-align: center;
}

.btn:hover {
    background-color: var(--btn-hover);
    box-shadow: 0 4px 0 #990000; transform: translateY(-2px);
}
.btn:active { transform: translateY(2px); box-shadow: 0 0 0 #990000; }

.btn-outline {
    background: none;
    border: 2px solid var(--accent-color);
    color: var(--accent-color);
}

.btn-outline:hover {
    background-color: rgba(255, 51, 51, 0.1);
    color: var(--accent-color);
    box-shadow: none;
    transform: none;
}

/* EDITOR DE CÓDIGO CON MARCA ROJA */
.editor-codigo {
    width: 100%;
    height: 200px;
    background-color: #000;
    color: #00ff41; 
    font-family: 'Courier New', monospace;
    padding: 15px;
    border: 1px solid #222;
    border-left: 3px solid var(--accent-color);
    border-radius: 2px;
    margin-top: 10px;
    resize: vertical;
}

/* UTILIDADES */
.d-flex { display: flex; }
.justify-content-between { justify-content: space-between; }
.align-items-center { align-items: center; }

/* MODO DARK/LIGHT SWITCH */
.theme-toggle {
    cursor: pointer;
    background: none;
    border: none;
    color: var(--text-color);
    font-size: 1.2rem;
}

/* =========================================
   NUEVA ESTRUCTURA: MENÚ LATERAL Y CONTENIDO
   ========================================= */

.global-layout {
    display: grid;
    grid-template-columns: 200px 1fr; /* 200px para el menú, el resto para el contenido */
    gap: 40px;
    max-width: 1200px;
    margin: 40px auto;
    padding: 0 20px;
    min-height: 80vh;
}

.sidebar-menu {
    position: sticky;
    top: 100px; /* Se queda fijo al bajar la página */
    height: fit-content;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.menu-btn {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 12px 20px;
    color: var(--text-color);
    text-decoration: none;
    font-weight: 700;
    font-size: 0.9rem;
    border-radius: 12px;
    border: 2px solid transparent;
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.menu-btn:hover { background-color: var(--secondary-accent); }
.menu-btn.active {
    background-color: rgba(255, 51, 51, 0.1);
    border-color: var(--accent-color);
    color: var(--accent-color);
}
.menu-icon { font-size: 1.5rem; }

/* Ocultar menú en celulares */
@media (max-width: 768px) {
    .global-layout { grid-template-columns: 1fr; }
    .sidebar-menu { display: none; } 
}

</style>
</head>
<body>

<nav class="navbar">
    <a href="/" class="logo">🦉REDOWL <span>ACADEMY</span></a>

    <div class="d-flex align-items-center" style="gap: 20px;">
        {% if user.is_authenticated %}
            <span style="font-size: 0.8rem; color: #888; font-weight: bold;">
                {{ user.username }} | <b style="color: var(--accent-color);">{{ user.estudiante.xp_total|default:"0" }} XP</b>
            </span>
            <form action="{% url 'logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline" style="padding: 8px 15px; font-size: 10px;">SALIR</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-outline" style="padding: 8px 15px; font-size: 11px;">Entrar</a>
            <a href="{% url 'registro' %}" class="btn" style="padding: 8px 15px; font-size: 11px;">Registrarse</a>
        {% endif %}

        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </div>
</nav>

<div class="global-layout">
    
    {% if user.is_authenticated %}
    <aside class="sidebar-menu">
        <a href="{% url 'lista_cursos' %}" class="menu-btn {% if request.path == '/' or '/curso/' in request.path %}active{% endif %}">
            <span class="menu-icon">🏠</span> Aprender
        </a>
        <a href="{% url 'ligas' %}" class="menu-btn {% if request.path == '/ligas/' %}active{% endif %}">
            <span class="menu-icon">🛡️</span> Ligas
        </a>
        <a href="{% url 'desafios' %}" class="menu-btn {% if request.path == '/desafios/' %}active{% endif %}">
            <span class="menu-icon">🎁</span> Desafíos
        </a>
        <a href="{% url 'perfil' %}" class="menu-btn {% if request.path == '/perfil/' %}active{% endif %}">
            <span class="menu-icon">👤</span> Perfil
        </a>
    </aside>
    {% endif %}

    <main class="content-area">
        {% block content %}
        {% endblock %}
    </main>

</div>

<script>
    function toggleTheme() {
        const body = document.documentElement;
        const currentTheme = body.getAttribute('data-theme');
        if (currentTheme === 'light') {
            body.removeAttribute('data-theme');
            localStorage.setItem('theme', 'dark');
        } else {
            body.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
        }
    }

    // Cargar tema guardado
    if (localStorage.getItem('theme') === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
    }
</script>
</body>
</html>
